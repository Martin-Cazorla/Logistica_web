<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMS Logística - Carga Continua</title>
    <link rel="stylesheet" href="css/styles.css">  
</head>
<body class="index-body">
    <header class="header-principal">
        <div class="header-top">
            <h1>TMS - Control de Vueltas Diarias</h1>
            <div class="header-actions">
                <input type="date" id="fecha-operacion" class="input-fecha-header">
                <button id="btn-logout" class="btn-logout-top">CERRAR SESIÓN</button>
            </div>
        </div>
        <nav class="navbar">
            <ul>
                <li><a href="index.html" class="active">PANEL DE CARGA</a></li>
                <li><a href="pages/indicadores.html">INDICADORES</a></li>
                <li><a href="pages/historial.html">HISTORIAL</a></li>
            </ul>
        </nav>
    </header>

    <main class="resumen-container">
        <section class="kpis" aria-label="Indicadores clave de desempeño">
                <div class="kpi-card">
                    <span class="kpi-label">EN RUTA</span>
                    <span id="contador-en-ruta" class="kpi-value">0</span>
                </div>
                <div class="kpi-card">
                    <span class="kpi-label">DISPONIBLES (< 3 vtas)</span>
                    <span id="contador-disponibles" class="kpi-value">0</span>
                </div>
                <div class="kpi-card">
                    <span class="kpi-label">VUELTAS TOTALES</span>
                    <span id="total-vueltas-dia" class="kpi-value">0</span>
                </div>
        </section>

        <section class="acciones-botones">   
            <button class="btn-excel" id="btn-exportar">DESCARGAR DÍA</button>
            <button class="btn-limpiar" id="btn-finalizar-jornada">FINALIZAR JORNADA</button> 
        </section>
    </main>

    <section class="tabla-contenedor">
        <table class="tabla-logistica">
            <thead>
                <tr>
                    <th>Unidad</th>
                    <th>Modelo/Tamaño</th>
                    <th>Chofer</th>
                    <th>Vueltas Realizadas</th>
                    <th>Horario de Ingreso</th>
                    <th>Estado Actual</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-body"></tbody>
        </table>
    </section>

    <div id="modalGestionVueltas" class="modal">
        <div class="modal-content">
            <header class="modal-header">
                <h3>Gestión Unidad: <span id="modal-id-unidad">--</span></h3>
                <button id="btn-cerrar-modal" class="close-modal">&times;</button>
            </header>
            
            <div class="vueltas-grid">
                <template id="template-vuelta">
                    <div class="vuelta-bloque">
                        <h4>Vuelta <span class="nro-v"></span></h4>
                        <div class="m-group">
                            <label>Banda:</label>
                            <select class="m-banda">
                                <option value="10-14">10:00 a 14:00hs</option>
                                <option value="13-16">13:00 a 16:00hs</option>
                                <option value="16-19">16:00 a 19:00hs</option>
                                <option value="19-21">19:00 a 21:00hs</option>
                            </select>
                        </div>
                        <div class="m-group">
                            <label>Zona:</label>
                            <select class="m-zona"><option value="Cerca">Cerca</option><option value="Campo">Campo</option></select>
                        </div>
                        <div class="m-group">
                            <label>Estado:</label>
                            <select class="m-estado"><option value="Salida">Salida</option><option value="Libre">Libre</option></select>
                        </div>
                    </div>
                </template>
                <div id="vueltas-container"></div>
            </div>

            <footer class="modal-footer">
                <button class="btn-guardar" id="btn-actualizar-vueltas">GUARDAR CAMBIOS</button>
            </footer>
        </div>
    </div>

    <script type="module" src="js/pages/main.js"></script> 
</body>
</html>
