<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indicadores Logísticos - TMS</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="indicadores-body">
    <header class="header-principal">
        <div class="header-top">
            <h1>PANEL DE INDICADORES (KPIs)</h1>
            <button id="btn-logout" class="btn-logout-top">CERRAR SESIÓN</button>
        </div>
        <nav class="navbar">
            <ul>
                <li><a href="../index.html">PANEL DE CARGA</a></li>
                <li><a href="indicadores.html" class="active">INDICADORES</a></li>
                <li><a href="historial.html">HISTORIAL</a></li>
            </ul>
        </nav>
    </header>

    <main class="resumen-container">
        <div class="tabs-indicadores">
            <button class="tab-btn active" data-tab="dia">INDICADORES DEL DÍA</button>
            <button class="tab-btn" data-tab="periodo">INDICADORES MENSUALES / ANUALES</button>
        </div>

        <div class="filtros-indicadores">
            <input type="date" id="fecha-indicador" class="input-fecha-header">
            
            <div id="controles-periodo" style="display: none; gap: 15px; align-items: center;">
                <div class="filtro-grupo">
                    <label>Mes:</label>
                    <select id="select-mes">
                        <option value="01">Enero</option>
                        <option value="02">Febrero</option>
                        <option value="03" selected>Marzo</option>
                        <option value="04">Abril</option>
                        <option value="05">Mayo</option>
                        <option value="06">Junio</option>
                        <option value="07">Julio</option>
                        <option value="08">Agosto</option>
                        <option value="09">Septiembre</option>
                        <option value="10">Octubre</option>
                        <option value="11">Noviembre</option>
                        <option value="12">Diciembre</option>
                    </select>
                </div>
                <div class="filtro-grupo">
                    <label>Año:</label>
                    <select id="select-anio">
                        <option value="2026" selected>2026</option>
                        <option value="2025">2025</option>
                    </select>
                </div>
            </div>
        </div>

        <section class="kpis" style="margin-bottom: 20px;">
            <div class="kpi-card">
                <span class="kpi-label">UNIDADES TOTALES</span>
                <span id="total-unidades-kpi" class="kpi-value">0</span>
            </div>
            <div class="kpi-card" style="border-left-color: #E30613;">
                <span class="kpi-label">UNIDADES CON EXTRA (4ta V)</span>
                <span id="total-extras-kpi" class="kpi-value">0</span>
            </div>
        </section>

        <div class="charts-grid">
            <div class="chart-container">
                <h3>Carga por Banda Horaria</h3>
                <canvas id="chartBandas"></canvas>
            </div>
            <div class="chart-container">
                <h3 id="titulo-grafico-secundario">Estado de la Flota</h3>
                <canvas id="chartFlota"></canvas>
            </div>
        </div>
    </main>

    <script type="module" src="../js/pages/indicadores-handler.js"></script>
</body>
</html>
