<!DOCTYPE html>
<html lang="es">
<head>   
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Logística - TMS</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>  

<body class="historial-body">

    <header class="header-principal">
        <div class="header-top">
            <h1>HISTORIAL DE CARGAS ARCHIVADAS</h1>
        </div>
        <nav class="navbar">
            <ul>
                <li><a href="../index.html">PANEL DE CARGA</a></li>
                <li><a href="indicadores.html">INDICADORES</a></li>
                <li><a href="historial.html" class="active">HISTORIAL</a></li>
            </ul>
        </nav>
    </header>

    <main class="resumen-container">
        <div class="filtros-container">
            <div class="filtro-grupo">
                <label>Fecha:</label>
                <input type="date" id="filtro-fecha">
            </div>
            <div class="filtro-grupo">
                <label>Unidad (ID):</label>
                <input type="text" id="filtro-unidad" placeholder="Ej: 28">
            </div>
        </div>

        <div class="kpis-secundarios" style="margin: 20px 0;">
            <div class="kpi-card-small">
                <span class="kpi-label">REGISTROS</span>
                <span id="total-registros" class="kpi-value-small">0</span>
            </div>
        </div>

        <div class="acciones-botones">   
            <button class="btn-excel" id="btn-limpiar-filtros" style="background-color: #6c757d;">LIMPIAR</button>
            <button class="btn-excel" id="btn-descargar-excel">DESCARGAR EXCEL</button>
        </div>
    </main>

    <section class="tabla-contenedor">
        <table class="tabla-logistica">
            <thead>
                <tr>
                    <th>FECHA</th>
                    <th>INGRESO</th>
                    <th>UNIDAD</th>
                    <th>CHOFER</th>
                    <th>VUELTAS</th>
                    <th>RESUMEN VUELTAS</th>
                    <th>ACCIONES</th>
                </tr>
            </thead>
            <tbody id="tabla-historial-body"></tbody>
        </table>
    </section>

    <div id="modalEditar" class="modal">
        <div class="modal-content">
            <header class="modal-header"><h3>Ver/Editar Registro</h3></header>
            <div class="modal-body" style="padding: 20px;">
                <input type="hidden" id="edit-id">
                <div class="form-group"><label>Horario Ingreso:</label>
                    <select id="edit-horario">
                        <option value="10:00hs">10:00hs</option>
                        <option value="11:00hs">11:00hs</option>
                        <option value="Electro">Electro</option>
                        <option value="Ausente">Ausente</option>
                    </select>
                </div>
                </div>   
            <footer class="modal-footer">
                <button class="btn-cancelar" id="btn-cerrar-modal">Cerrar</button>
                <button class="btn-guardar" id="btn-guardar-modal">Guardar</button>
            </footer>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script type="module" src="../js/pages/historial-handler.js"></script>
</body>
</html>
